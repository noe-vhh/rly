<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>relay</title>
    <link rel="stylesheet" href="/static/css/style.css?v=4">
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
</head>
<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="sidebar-header">relay</div>
            <nav class="sidebar-nav">
                <div class="nav-label">Categories</div>
                <a class="nav-item active" href="#">All</a>
            </nav>
        </aside>
        <main class="content">
            <header class="content-header">
                <h1>All actions</h1>
                <button class="theme-toggle" onclick="
                    document.body.classList.toggle('theme-one-dark');
                    if (document.body.classList.contains('theme-one-dark')) {
                        localStorage.setItem('theme', 'one-dark');
                    } else {
                        localStorage.removeItem('theme');
                    }
                ">◐</button>
            </header>
            <div class="action-list" 
                id="action-list"
                hx-get="/api/actions/cards"
                hx-trigger="load"
                hx-target="#action-list"
                hx-swap="innerHTML">
            </div>
        </main>
    </div>
<script>
    if (localStorage.getItem('theme') === 'one-dark') {
        document.body.classList.add('theme-one-dark');
    }
</script>
<script src="/static/js/main.js"></script>
</body>
</html>
